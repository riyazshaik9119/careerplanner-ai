<!DOCTYPE html>
<html>
<head>
<title>Aspira</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f1f5f9;
  color:#0f172a;
}

/* Layout */
.container {
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar {
  width:220px;
  background:white;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.nav-item {
  padding:10px;
  margin-bottom:10px;
  cursor:pointer;
  border-radius:8px;
}

.nav-item:hover {
  background:#f1f5f9;
}

/* Main */
.main {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* Right */
.right {
  width:260px;
  padding:20px;
  border-left:1px solid #e5e7eb;
  background:white;
}

/* Cards */
.card {
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.2s;
}

.card:hover {
  transform:translateY(-2px);
}

/* Button */
.button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  cursor:pointer;
}

.button:hover {
  transform:scale(1.03);
}

.input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #e5e7eb;
}

/* Landing */
.center {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* Stats */
.stat {
  flex:1;
  background:rgba(255,255,255,0.2);
  padding:15px;
  border-radius:12px;
  text-align:center;
  color:white;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

let AppState = JSON.parse(localStorage.getItem("aspira")) || {
  user:{},
  page:"landing",
  posts:[],
  streak:1,
  readiness:20
};

function save(){
  localStorage.setItem("aspira", JSON.stringify(AppState));
}

function go(page){
  AppState.page = page;
  save();
  render();
}

/* LANDING */
function landing(){
  return `
  <div class="center">
    <div class="card" style="width:400px;text-align:center">
      <h2>Aspira</h2>
      <p>Design your career path</p>
      <input class="input" id="name" placeholder="Enter your name"/>
      <button class="button" onclick="start()">Get Started</button>
    </div>
  </div>`;
}

function start(){
  AppState.user.name = document.getElementById("name").value;
  go("profile");
}

/* PROFILE */
function profile(){
  return layout(`
    <div class="card">
      <h3>Build Profile</h3>
      <input class="input" id="goal" placeholder="Your goal (Data Analyst)"/>
      <button class="button" onclick="saveProfile()">Continue</button>
    </div>
  `);
}

function saveProfile(){
  AppState.user.goal = document.getElementById("goal").value;
  go("assessment");
}

/* ASSESSMENT */
function assessment(){
  return layout(`
    <div class="card">
      <h3>Assessment</h3>
      <p>Do you enjoy solving problems?</p>
      <button class="button" onclick="finish()">Yes</button>
    </div>
  `);
}

function finish(){
  go("dashboard");
}

/* DASHBOARD */
function dashboard(){
  return layout(`
    
    <div class="card" style="background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;">
      <h2>Hello ${AppState.user.name}</h2>
      <p>${AppState.user.goal} Journey</p>

      <div style="display:flex;gap:10px;margin-top:15px;">
        <div class="stat">🔥 ${AppState.streak}<br/>Streak</div>
        <div class="stat">📊 ${AppState.readiness}%<br/>Ready</div>
        <div class="stat">✅ 1<br/>Tasks</div>
      </div>
    </div>

    <div class="card">
      <h3>Today's Task</h3>
      <p>Learn basics of ${AppState.user.goal}</p>
      <button class="button" onclick="completeTask()">Mark Complete</button>
    </div>

    <div class="card">
      <h3>Community Updates</h3>
      <button class="button" onclick="go('home')">Go to Feed</button>
    </div>

  `);
}

function completeTask(){
  AppState.streak++;
  AppState.readiness += 5;

  AppState.posts.unshift({
    text: AppState.user.name + " completed today's task",
    likes:0
  });

  save();
  render();
}

/* COMMUNITY */
function home(){

  if(AppState.posts.length === 0){
    AppState.posts = [
      {text:"Someone completed Day 1",likes:2},
      {text:"Someone reached 40% readiness",likes:5}
    ];
  }

  return layout(`
    
    <div class="card">
      <h3>Ask AI</h3>
      <input class="input" id="q" placeholder="Ask your doubt"/>
      <button class="button" onclick="post()">Ask</button>
    </div>

    ${AppState.posts.map(p=>postCard(p)).join("")}

  `);
}

function post(){
  let text = document.getElementById("q").value;
  if(!text) return;

  AppState.posts.unshift({text:text,likes:0});
  save();
  render();
}

function postCard(p){
  return `
  <div class="card">
    <strong>${AppState.user.goal || "Career"}</strong>
    <p>${p.text}</p>

    <div style="background:#eef2ff;padding:10px;border-radius:8px;">
      <b>AI:</b> Stay consistent and focus on fundamentals.
    </div>

    <button class="button">👍 ${p.likes}</button>
  </div>`;
}

/* LAYOUT */
function layout(content){
  return `
  <div class="container">

    <div class="sidebar">
      <h2>Aspira</h2>
      <div class="nav-item" onclick="go('dashboard')">Dashboard</div>
      <div class="nav-item" onclick="go('home')">Community</div>
      <div class="nav-item" onclick="go('assessment')">Assessment</div>
    </div>

    <div class="main">
      ${content}
    </div>

    <div class="right">
      <div class="card">
        <h4>Next Step</h4>
        <p>Complete today's task</p>
      </div>

      <div class="card">
        <h4>Your Goal</h4>
        <p>${AppState.user.goal || "Not set"}</p>
      </div>

      <div class="card">
        <h4>Motivation</h4>
        <p>Consistency beats talent</p>
      </div>
    </div>

  </div>`;
}

/* RENDER */
function render(){
  const app = document.getElementById("app");

  if(AppState.page==="landing") app.innerHTML = landing();
  if(AppState.page==="profile") app.innerHTML = profile();
  if(AppState.page==="assessment") app.innerHTML = assessment();
  if(AppState.page==="dashboard") app.innerHTML = dashboard();
  if(AppState.page==="home") app.innerHTML = home();
}

render();

</script>

</body>
</html>
