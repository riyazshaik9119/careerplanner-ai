<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerPlanner AI</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#050816,#020617);
  color:white;
  text-align:center;
}

/* Logo */
.logo {
  font-size:32px;
  font-weight:bold;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00f7ff,#00ff88);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Hero */
.hero {
  padding:100px 20px;
}

.tagline {
  font-size:18px;
  color:#9ca3af;
  margin-bottom:20px;
}

button {
  padding:14px 26px;
  background:linear-gradient(90deg,#00f7ff,#00ff88);
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

button:hover {
  opacity:0.9;
}

/* Features */
.features {
  margin-top:50px;
}

.feature {
  margin:15px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="hero">

<div class="logo">📘📈 CareerPlanner AI</div>

<p class="tagline">
Your AI-powered path to a better career
</p>

<button onclick="window.location='index.html'">
Start Planning 🚀
</button>

<div class="features">

<p class="feature">✔ Get personalized career roadmap</p>
<p class="feature">✔ Track your progress</p>
<p class="feature">✔ Build skills for global opportunities</p>

</div>

</div>

</body>
</html>
