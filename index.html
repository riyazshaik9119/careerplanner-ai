<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerPlanner AI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00f7ff">

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0b1220;
  color:white;
}

.container {
  display:flex;
}

.sidebar {
  width:220px;
  background:#111827;
  height:100vh;
  padding:20px;
}

.logo {
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(90deg,#00f7ff,#00ff88);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#1f2937;
  color:white;
  border:none;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.card {
  background:#111827;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
}

h2 { color:#00f7ff; }

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#1f2937;
  border:none;
  color:white;
}

.main-btn {
  background:linear-gradient(90deg,#00f7ff,#00ff88);
  color:black;
  padding:10px;
  border:none;
  width:100%;
}

.progress {
  height:10px;
  background:#222;
}

.bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f7ff,#00ff88);
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div class="logo">📘📈 CareerPlanner AI</div>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('planner')">AI Planner</button>
<button onclick="show('tracker')">Tracker</button>
<button onclick="show('notes')">Notes</button>
</div>

<div class="main">

<div id="dashboard" class="card">
<h2>Dashboard</h2>

<p>Welcome! Go to AI Planner to start 🚀</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="percent">0%</p>
</div>

<div id="planner" class="card" style="display:none;">
<h2>AI Planner</h2>

<input id="goal" placeholder="Your goal">

<button class="main-btn" onclick="generate()">Generate</button>

<div id="output"></div>
</div>

<div id="tracker" class="card" style="display:none;">
<h2>Tracker</h2>

<label><input type="checkbox" onchange="update()"> SQL</label>
<label><input type="checkbox" onchange="update()"> Power BI</label>
<label><input type="checkbox" onchange="update()"> AI</label>

</div>

<div id="notes" class="card" style="display:none;">
<h2>Notes</h2>
<textarea id="noteBox"></textarea>
</div>

</div>
</div>

<script>

function show(section){
["dashboard","planner","tracker","notes"].forEach(id=>{
document.getElementById(id).style.display="none";
});
document.getElementById(section).style.display="block";
}

function generate(){
document.getElementById("output").innerText =
"1. Learn SQL\n2. Learn Power BI\n3. Build projects";
}

function update(){
let total = document.querySelectorAll("input[type=checkbox]").length;
let checked = document.querySelectorAll("input[type=checkbox]:checked").length;

let percent = Math.round((checked/total)*100);

document.getElementById("bar").style.width = percent+"%";
document.getElementById("percent").innerText = percent+"%";

localStorage.setItem("progress", percent);
}

window.onload = function(){
let p = localStorage.getItem("progress");
if(p){
document.getElementById("bar").style.width = p+"%";
document.getElementById("percent").innerText = p+"%";
}
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
