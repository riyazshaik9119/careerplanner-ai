<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerPlanner AI</title>

<style>
body {
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#0b1220;
  color:white;
}

.app {
  display:flex;
}

/* Sidebar */
.sidebar {
  width:230px;
  background:#111827;
  height:100vh;
  padding:20px;
}

.logo {
  font-size:18px;
  font-weight:bold;
  margin-bottom:20px;
}

.nav button {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#1f2937;
  color:white;
  border:none;
  cursor:pointer;
}

/* Main */
.main {
  flex:1;
  padding:20px;
}

.card {
  background:#111827;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#1f2937;
  border:none;
  color:white;
}

button.primary {
  background:#00c2ff;
  border:none;
  padding:10px;
  width:100%;
  cursor:pointer;
}

/* Chat */
.chat {
  height:200px;
  overflow:auto;
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">📘📈 CareerPlanner AI</div>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('cert')">Cert Suggester</button>
<button onclick="show('roadmap')">Roadmap</button>
<button onclick="show('roi')">ROI</button>
<button onclick="show('tracker')">Tracker</button>
<button onclick="show('ai')">AI Coach</button>
</div>
</div>

<div class="main">

<!-- Dashboard -->
<div id="dashboard" class="card">
<h2>Welcome Riyaz 👋</h2>
<p>Your AI Career Planner</p>
</div>

<!-- Cert -->
<div id="cert" class="card" style="display:none;">
<h2>Certification Suggester</h2>
<input id="field" placeholder="Your field">
<input id="goal" placeholder="Your goal">

<button class="primary" onclick="suggest()">Suggest</button>

<div id="certOut"></div>
</div>

<!-- Roadmap -->
<div id="roadmap" class="card" style="display:none;">
<h2>Roadmap</h2>
<button onclick="roadmap()">Generate</button>
<div id="roadmapOut"></div>
</div>

<!-- ROI -->
<div id="roi" class="card" style="display:none;">
<h2>ROI Calculator</h2>
<input id="salary" placeholder="Current salary">
<button onclick="calcROI()">Calculate</button>
<p id="roiOut"></p>
</div>

<!-- Tracker -->
<div id="tracker" class="card" style="display:none;">
<h2>Progress Tracker</h2>

<label><input type="checkbox" onchange="update()"> SQL</label><br>
<label><input type="checkbox" onchange="update()"> Power BI</label><br>
<label><input type="checkbox" onchange="update()"> Salesforce</label>

<p id="progress">0%</p>
</div>

<!-- AI -->
<div id="ai" class="card" style="display:none;">
<h2>AI Coach</h2>

<div class="chat" id="chat"></div>

<input id="q" placeholder="Ask anything">
<button class="primary" onclick="askAI()">Ask</button>

</div>

</div>
</div>

<script>

// Navigation
function show(id){
["dashboard","cert","roadmap","roi","tracker","ai"]
.forEach(i=>document.getElementById(i).style.display="none");

document.getElementById(id).style.display="block";
}

// Suggest
function suggest(){
let field = document.getElementById("field").value;

let result = field.includes("sales") ?
"🔥 Salesforce + BA + Power BI" :
"🔥 Business Analyst + SQL + AI";

document.getElementById("certOut").innerText = result;
}

// Roadmap
function roadmap(){
document.getElementById("roadmapOut").innerText =
"Week1: Basics\nWeek2: Tools\nWeek3: Practice\nWeek4: Apply";
}

// ROI
function calcROI(){
let sal = document.getElementById("salary").value;
document.getElementById("roiOut").innerText =
"Expected: " + (sal * 1.5);
}

// Tracker
function update(){
let total = document.querySelectorAll("input[type=checkbox]").length;
let checked = document.querySelectorAll("input[type=checkbox]:checked").length;

let p = Math.round((checked/total)*100);
document.getElementById("progress").innerText = p + "%";
}

// AI Chat
function askAI(){
let q = document.getElementById("q").value;
let chat = document.getElementById("chat");

chat.innerHTML += "<p><b>You:</b> " + q + "</p>";

let answer = "Start with BA + Power BI + AI";

if(q.includes("salesforce")){
answer = "Salesforce + BA is best for global jobs";
}

chat.innerHTML += "<p><b>AI:</b> " + answer + "</p>";
}

</script>

</body>
</html>
